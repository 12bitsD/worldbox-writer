name: Reusable Frontend Quality

on:
  workflow_call:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run frontend quality gate
        run: CI=true INSTALL_DEPS=1 sh scripts/ci/frontend-quality.sh

      - name: Upload frontend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-reports
          path: artifacts/reports/frontend
          if-no-files-found: ignore
