name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black isort mypy pytest pytest-cov

      - name: Check formatting (black)
        run: |
          # Only check Python files if they exist
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            black --check .
          else
            echo "No Python files found, skipping black check"
          fi

      - name: Check import order (isort)
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            isort --check-only .
          else
            echo "No Python files found, skipping isort check"
          fi

      - name: Run tests
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest --cov=src --cov-report=term-missing -v
          else
            echo "No test files found yet, skipping pytest (Sprint 1 will add tests)"
          fi
