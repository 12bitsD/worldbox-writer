name: Model Evaluation

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider to evaluate"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - mimo
          - openai
          - ollama

jobs:
  model-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run model evaluation placeholder
        env:
          MODEL_EVAL_PROVIDERS: ${{ inputs.provider }}
          LLM_PROVIDER: ${{ inputs.provider }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        run: INSTALL_DEPS=1 PYTHON_BIN=python sh scripts/ci/model-eval.sh
